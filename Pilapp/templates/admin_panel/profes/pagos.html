<!DOCTYPE html>
<html lang="es" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cobrar Alumnas</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
</head>
<body style="background-color: #f8f9fa; font-family: 'Inter', sans-serif; color: #212529; padding-bottom: 3rem;">
    <style>
        .header {
            background: linear-gradient(180deg, #2c3e50 0%, #1a252f 100%);
            padding: 1rem 1.5rem;
            position: sticky;
            top: 0;
            z-index: 100;
            box-shadow: 0 0.125rem 0.25rem rgba(0,0,0,0.075);
            color: white;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        .header h5 { font-size: 1.25rem; font-weight: 600 !important; }
        .header small { font-size: 0.85rem; opacity: 0.8; }
        
        /* Custom Tabs */
        .nav-tabs .nav-link {
            color: #6c757d;
            border: none;
            font-weight: 600;
            padding: 0.75rem 1.5rem;
            text-transform: uppercase;
            font-size: 0.85rem;
        }
        .nav-tabs .nav-link.active {
            color: #6f42c1;
            background-color: transparent;
            border-bottom: 3px solid #6f42c1;
        }
    </style>

    <div class="header">
        <h5 class="mb-0 fw-bold">Cobros a Alumnas</h5>
        <small>Registra pagos en efectivo o transferencias</small>
    </div>

    <!-- Navigation Tabs -->
    <div class="bg-white px-3 pt-2 border-bottom shadow-sm mb-4 sticky-top" style="top: 70px; z-index: 90;">
        <ul class="nav nav-tabs border-0" style="margin-bottom: -1px;">
            <li class="nav-item">
                <a class="nav-link" href="{% url 'profes_clases_hoy' token %}">
                    <i class="bi bi-calendar-check me-2"></i>Asistencias
                </a>
            </li>
            <li class="nav-item">
                <a class="nav-link active" href="{% url 'profes_pagos' token %}">
                    <i class="bi bi-cash-coin me-2"></i>Cobros
                </a>
            </li>
        </ul>
    </div>

    <div class="container mt-3">
        {% if messages %}
        <div class="mb-3">
            {% for message in messages %}
            <div class="alert alert-{{ message.tags }} alert-dismissible fade show border-0 bg-opacity-10 py-2" role="alert">
                <small>{{ message }}</small>
                <button type="button" class="btn-close btn-close-dark" style="padding: 0.75rem 1rem;" data-bs-dismiss="alert"></button>
            </div>
            {% endfor %}
        </div>
        {% endif %}

        <div class="card mb-4 shadow-sm" style="border-radius: 12px; border: 1px solid rgba(255,255,255,0.1);">
            <div class="card-header bg-white text-dark py-3" style="border-bottom: 2px solid #f0f0f0; border-radius: 11px 11px 0 0;">
                <h6 class="mb-0 fw-bold text-center" style="color: #4a4a4a;">
                    <span style="font-size: 1.1rem; margin-right: 5px;">💰</span> REGISTRO DE PAGOS
                </h6>
            </div>
            <div class="card-body bg-white text-dark p-4">
                <form method="post" action="{% url 'profes_registrar_pago' token %}">
                    {% csrf_token %}
                    
                    <div class="mb-3">
                        <label class="form-label text-muted fw-bold" style="font-size: 0.75rem;">PROFESORA</label>
                        <select name="id_profesora" class="form-select border-secondary-subtle" required style="font-size: 0.9rem;">
                            <option value="">-- Selecciona tu nombre --</option>
                            {% for profe in instructoras %}
                            <option value="{{ profe.id_instructor }}">{{ profe.id_persona.nombre }} {{ profe.id_persona.apellido }}</option>
                            {% endfor %}
                        </select>
                    </div>

                    <div class="mb-3">
                        <label class="form-label text-muted fw-bold" style="font-size: 0.75rem;">ALUMNA</label>
                        <select name="id_alumno_paquete" class="form-select border-secondary-subtle" required style="font-size: 0.9rem;">
                            <option value="">Buscar alumna...</option>
                            {% for paquete in paquetes_deudores %}
                            <option value="{{ paquete.id_alumno_paquete }}">
                                {{ paquete.id_alumno.id_persona.nombre }} {{ paquete.id_alumno.id_persona.apellido }} - {{ paquete.id_paquete.nombre }} (Gs. {{ paquete.id_paquete.costo|floatformat:"0" }})
                            </option>
                            {% endfor %}
                        </select>
                    </div>

                    <div class="row mb-3">
                        <div class="col-6 pe-2">
                            <label class="form-label text-muted fw-bold" style="font-size: 0.75rem;">CONCEPTO</label>
                            <select name="tipo_pago" class="form-select border-secondary-subtle select-tipo-pago" required style="font-size: 0.9rem;">
                                <option value="renovar">Paquete</option>
                                <option value="saldar">Saldar Deuda</option>
                            </select>
                        </div>
                        <div class="col-6 ps-2">
                            <label class="form-label text-muted fw-bold" style="font-size: 0.75rem;">MONTO (Gs.)</label>
                            <input type="number" name="monto" class="form-control border-secondary-subtle" required placeholder="0" style="font-size: 0.9rem;">
                        </div>
                    </div>

                    <div class="mb-3 row-fecha-inicio">
                        <label class="form-label text-muted fw-bold" style="font-size: 0.75rem;">INICIO DEL PAQUETE</label>
                        <input type="date" name="fecha_inicio" class="form-control border-secondary-subtle" style="font-size: 0.9rem;">
                        <small class="text-muted" style="font-size: 0.7rem;">Si queda vacío, inicia hoy.</small>
                    </div>

                    <div class="row mb-4">
                        <div class="col-6 pe-2">
                            <label class="form-label text-muted fw-bold" style="font-size: 0.75rem;">MEDIO</label>
                            <select name="metodo_pago" class="form-select border-secondary-subtle fw-semibold" required style="font-size: 0.9rem;">
                                <option value="efectivo">EFECTIVO</option>
                                <option value="transferencia">TRANSFERENCIA</option>
                            </select>
                        </div>
                        <div class="col-6 ps-2">
                            <label class="form-label text-muted fw-bold" style="font-size: 0.75rem;">FECHA PAGO</label>
                            <input type="date" name="fecha_pago" class="form-control border-secondary-subtle" required value="{% now 'Y-m-d' %}" style="font-size: 0.9rem;">
                        </div>
                    </div>

                    <button type="submit" class="btn w-100 fw-bold py-2" style="background-color: #6f42c1; color: white; border-radius: 8px;">GUARDAR</button>
                </form>
            </div>
        </div>
    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        document.querySelectorAll('.select-tipo-pago').forEach(select => {
            select.addEventListener('change', function() {
                const form = this.closest('form');
                const rowFecha = form.querySelector('.row-fecha-inicio');
                if (this.value === 'renovar') {
                    rowFecha.style.display = 'block';
                } else {
                    rowFecha.style.display = 'none';
                    form.querySelector('input[name="fecha_inicio"]').value = '';
                }
            });
        });
    </script>
</body>
</html>
